# Agent Release: creates a version tag and triggers the full release pipeline.
#
# Trigger: add `release-ready` label to an issue, OR workflow_dispatch.
# The workflow bumps the alpha version, creates a tag, pushes it (which triggers
# release-electrobun.yml, publish-npm.yml, build-docker.yml, etc.), and then
# creates a GitHub release that fires the remaining release workflows.
#
# Trust-gated: only org members or legendary/trusted contributors (75+).
#
# Safety:
# - Trust-gated (see above)
# - Only creates alpha pre-release tags by default (not stable)
# - Stable releases require explicit workflow_dispatch with stable=true
# - Creates release as draft first, then publishes (two-step)
# - Never modifies source code — only creates tags and releases
name: Agent Release

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      stable:
        description: "Create a stable release (not alpha)"
        required: false
        type: boolean
        default: false
      version_override:
        description: "Explicit version (e.g. 2.0.0-alpha.126). Leave empty for auto-bump."
        required: false
        type: string

concurrency:
  group: agent-release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  BUN_VERSION: "1.3.10"

jobs:
  evaluate:
    name: Evaluate release need
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.eval.outputs.should_release }}
      reason: ${{ steps.eval.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate changes since last release
        id: eval
        run: |
          # Find the latest release tag
          LATEST_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=No prior release tag found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest release: $LATEST_TAG"

          # Count commits since last release
          COMMIT_COUNT=$(git rev-list --count "${LATEST_TAG}..HEAD")
          echo "Commits since $LATEST_TAG: $COMMIT_COUNT"

          # Get changed files since last release
          CHANGED_FILES=$(git diff --name-only "$LATEST_TAG"..HEAD)
          CHANGED_COUNT=$(echo "$CHANGED_FILES" | grep -c '.' || true)

          # Categorize changes
          SRC_CHANGES=$(echo "$CHANGED_FILES" | grep -cE '^(packages/|apps/|scripts/)' || true)
          DOC_ONLY=$([ "$SRC_CHANGES" -eq 0 ] && echo true || echo false)
          HAS_AGENT=$(echo "$CHANGED_FILES" | grep -cE '^packages/agent/' || true)
          HAS_APP_CORE=$(echo "$CHANGED_FILES" | grep -cE '^packages/app-core/' || true)
          HAS_ELECTROBUN=$(echo "$CHANGED_FILES" | grep -cE '^apps/app/electrobun/' || true)
          HAS_UI=$(echo "$CHANGED_FILES" | grep -cE '^packages/ui/' || true)

          echo "Source changes: $SRC_CHANGES | Doc-only: $DOC_ONLY"
          echo "Agent: $HAS_AGENT | App-core: $HAS_APP_CORE | Electrobun: $HAS_ELECTROBUN | UI: $HAS_UI"

          # Decision logic:
          # - Skip if doc-only changes
          # - Skip if fewer than 5 source commits since last release
          # - Release if 10+ source file changes across core packages
          # - Release if any electrobun changes (desktop builds need fresh releases)
          # - Release if 15+ commits accumulated
          if [ "$DOC_ONLY" = "true" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=Doc-only changes since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$COMMIT_COUNT" -lt 5 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=Only $COMMIT_COUNT commits since $LATEST_TAG (threshold: 5)" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_ELECTROBUN" -gt 0 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=Electrobun changes detected ($HAS_ELECTROBUN files). $COMMIT_COUNT commits, $SRC_CHANGES source files since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$SRC_CHANGES" -ge 10 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=$SRC_CHANGES source files changed across $COMMIT_COUNT commits since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$COMMIT_COUNT" -ge 15 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=$COMMIT_COUNT commits accumulated since $LATEST_TAG (threshold: 15)" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=$COMMIT_COUNT commits, $SRC_CHANGES source files since $LATEST_TAG — below thresholds" >> "$GITHUB_OUTPUT"
          fi

  gate:
    name: Trust gate
    # Run for manual/label triggers (evaluate is skipped), or when evaluate says yes.
    # `always()` ensures this job isn't blocked when evaluate is skipped.
    if: >-
      always() && (
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'issues' && github.event.label.name == 'release-ready') ||
        (needs.evaluate.result == 'success' && needs.evaluate.outputs.should_release == 'true')
      )
    needs: [evaluate]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      issues: write
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Checkout (for trust-scoring.cjs)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github
          fetch-depth: 1

      - name: Check trust eligibility
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { computeTrustScore, DEFAULT_CONFIG, createContributorState, expandState } = require('./.github/trust-scoring.cjs');
            const actor = context.actor;

            // Org member bypass
            let isOrgMember = false;
            try {
              const { status } = await github.rest.orgs.checkMembershipForUser({
                org: context.repo.owner,
                username: actor,
              });
              isOrgMember = status === 204 || status === 302;
            } catch (e) { /* not a member */ }

            if (isOrgMember) {
              core.info(`${actor} is org member — allowed`);
              core.setOutput('allowed', 'true');
              return;
            }

            // Trust check
            let trustTier = 'untested';
            let trustScore = DEFAULT_CONFIG.initialScore;
            try {
              const { data: fileData } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/contributor-trust.json',
                ref: 'develop',
              });
              const allStates = JSON.parse(Buffer.from(fileData.content, 'base64').toString());
              if (allStates[actor]) {
                const state = expandState(allStates[actor]);
                const result = computeTrustScore(state, DEFAULT_CONFIG);
                trustTier = result.tier;
                trustScore = result.score;
              }
            } catch (e) {
              core.info(`Trust data unavailable: ${e.message}`);
            }

            if (['legendary', 'trusted'].includes(trustTier)) {
              core.info(`${actor}: trust ${trustScore}/100 (${trustTier}) — allowed`);
              core.setOutput('allowed', 'true');
              return;
            }

            core.info(`${actor}: trust ${trustScore}/100 (${trustTier}) — denied`);
            core.setOutput('allowed', 'false');

            if (context.payload.issue) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.payload.issue.number, name: 'release-ready',
                });
              } catch (e) { /* ok */ }

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `⚠️ **Release not authorized**\n\n@${actor}, your trust tier (\`${trustTier}\`, score ${trustScore}/100) does not permit triggering releases. Only org members or trusted+ contributors (75+) can release.`,
              });
            }

  release:
    name: Create release
    needs: [evaluate, gate]
    if: always() && needs.gate.result == 'success' && needs.gate.outputs.allowed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        env:
          STABLE: ${{ github.event.inputs.stable || 'false' }}
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override || '' }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
          elif [ "$STABLE" = "true" ]; then
            # For stable: strip the pre-release suffix from the latest alpha
            LATEST=$(git tag --sort=-creatordate | grep '^v' | head -1)
            VERSION=$(echo "$LATEST" | sed 's/-alpha\.[0-9]*//' | sed 's/^v//')
          else
            # Auto-bump alpha: find latest alpha tag and increment
            LATEST=$(git tag --sort=-creatordate | grep '^v.*-alpha\.' | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="2.0.0-alpha.1"
            else
              PREFIX=$(echo "$LATEST" | sed 's/\.[0-9]*$/\./' | sed 's/^v//')
              NUM=$(echo "$LATEST" | grep -oE '[0-9]+$')
              NEXT=$((NUM + 1))
              VERSION="${PREFIX}${NEXT}"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$( [ '$STABLE' = 'true' ] && echo false || echo true )" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v$VERSION (prerelease=$( [ '$STABLE' = 'true' ] && echo false || echo true ))"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG;
            const version = process.env.VERSION;
            const prerelease = process.env.PRERELEASE === 'true';

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: [
                `## ${tag}`,
                '',
                prerelease ? '⚠️ Pre-release (alpha)' : '✅ Stable release',
                '',
                'This release was created by the agent release workflow.',
                '',
                '### Triggered pipelines',
                '- [ ] Electrobun desktop (macOS ARM, macOS Intel, Windows, Linux)',
                '- [ ] npm publish',
                '- [ ] Docker image',
                '- [ ] Android AAB → Play Store',
                '- [ ] iOS → App Store',
                '- [ ] macOS → App Store',
                '- [ ] Snap',
                '- [ ] Flatpak',
                '- [ ] Debian/APT',
                '- [ ] Homebrew',
                '- [ ] Homepage',
                '',
                `Triggered by @${context.actor}`,
              ].join('\n'),
              prerelease,
              draft: false,
            });

            core.info(`Created release: ${release.html_url}`);

            // Close the trigger issue if this was label-triggered
            if (context.payload.issue) {
              const issue = context.payload.issue.number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue,
                body: `🚀 **Release ${tag} created**\n\n${release.html_url}\n\nAll release pipelines have been triggered.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue,
                state: 'closed',
                state_reason: 'completed',
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue, name: 'release-ready',
                });
              } catch (e) { /* ok */ }
            }
